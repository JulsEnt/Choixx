services:
  - type: web
    name: choixx
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: MAX_UPLOAD_MB
        value: "35"
      - key: MAX_AUDIO_SECONDS
        value: "180"
      - key: CORS_ORIGINS
        value: "*"
